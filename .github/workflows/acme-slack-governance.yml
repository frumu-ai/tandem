name: ACME Slack Governance Proof

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/acme-slack-governance.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "engine/**"
      - "crates/tandem-server/**"
      - "packages/tandem-control-panel/**"
      - "docs/ACME_SLACK_DEMO_HARNESS.md"

jobs:
  acme-slack-governance:
    name: Five-profile production-path proof
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: acme-slack-governance

      - name: Run ACME governance tests
        run: cargo test --locked -p tandem-server --features acme-demo acme_slack_demo --lib

      - name: Run persistent proof twice
        shell: bash
        run: |
          set -euo pipefail
          state_dir="$RUNNER_TEMP/tandem-acme-state"
          mkdir -p "$RUNNER_TEMP/acme-proof"
          cargo run --locked -p tandem-ai --features acme-demo -- acme-slack-demo \
            --state-dir "$state_dir" > "$RUNNER_TEMP/acme-proof/first.json"
          cargo run --locked -p tandem-ai --features acme-demo -- acme-slack-demo \
            --state-dir "$state_dir" > "$RUNNER_TEMP/acme-proof/replay.json"
          node - "$RUNNER_TEMP/acme-proof/first.json" "$RUNNER_TEMP/acme-proof/replay.json" <<'NODE'
          const fs = require("node:fs");
          const [firstPath, replayPath] = process.argv.slice(2);
          const first = JSON.parse(fs.readFileSync(firstPath, "utf8"));
          const replay = JSON.parse(fs.readFileSync(replayPath, "utf8"));
          for (const [name, report] of [["first", first], ["replay", replay]]) {
            if (!report.ok || report.receipt_count !== 5 || report.slack_post_count !== 5) {
              throw new Error(`${name} run did not produce five complete Slack receipts`);
            }
            if (!report.approval_decision_ids?.length || !report.approval_evidence_receipt_run_ids?.length) {
              throw new Error(`${name} run did not correlate approval evidence to a receipt`);
            }
          }
          if (replay.reset.sessions < 5 || replay.reset.context_runs < 5 || replay.reset.memory_rows < 5) {
            throw new Error("replay did not prove deterministic reset of prior ACME demo state");
          }
          NODE

      - name: Upload proof reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: acme-slack-governance-proof
          path: ${{ runner.temp }}/acme-proof/*.json
          retention-days: 14
